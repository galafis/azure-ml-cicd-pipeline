# =============================================================================
# Azure DevOps CI/CD Pipeline for Azure ML
# =============================================================================
# Complete multi-stage pipeline: lint, test, train, evaluate, deploy
# Author: Gabriel Demetrios Lafis
# =============================================================================

trigger:
  branches:
    include:
      - main
      - develop
      - release/*
  paths:
    include:
      - src/**
      - tests/**
      - pipelines/**
      - infra/**

pr:
  branches:
    include:
      - main
      - develop

variables:
  - group: azure-ml-pipeline-vars
  - name: pythonVersion
    value: '3.11'
  - name: vmImage
    value: 'ubuntu-latest'
  - name: workingDirectory
    value: '$(System.DefaultWorkingDirectory)'
  - name: acrName
    value: '$(ACR_NAME)'
  - name: imageName
    value: 'azure-ml-pipeline'
  - name: imageTag
    value: '$(Build.BuildId)'

stages:
  # ===========================================================================
  # Stage 1: Code Quality & Linting
  # ===========================================================================
  - stage: Lint
    displayName: 'Code Quality'
    jobs:
      - job: LintAndFormat
        displayName: 'Lint & Format Check'
        pool:
          vmImage: $(vmImage)
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)
            displayName: 'Use Python $(pythonVersion)'

          - script: |
              python -m pip install --upgrade pip
              pip install ruff mypy
            displayName: 'Install linting tools'

          - script: |
              ruff check src/ tests/ --output-format=github
            displayName: 'Run Ruff linter'

          - script: |
              ruff format --check src/ tests/
            displayName: 'Check code formatting'

          - script: |
              mypy src/ --ignore-missing-imports --no-error-summary
            displayName: 'Run MyPy type checking'
            continueOnError: true

  # ===========================================================================
  # Stage 2: Unit & Integration Tests
  # ===========================================================================
  - stage: Test
    displayName: 'Testing'
    dependsOn: Lint
    jobs:
      - job: UnitTests
        displayName: 'Unit Tests'
        pool:
          vmImage: $(vmImage)
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)
            displayName: 'Use Python $(pythonVersion)'

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
              pip install pytest pytest-cov pytest-asyncio
            displayName: 'Install dependencies'

          - script: |
              python -m pytest tests/unit/ \
                -v \
                --tb=short \
                --cov=src \
                --cov-report=xml:$(workingDirectory)/coverage.xml \
                --cov-report=html:$(workingDirectory)/htmlcov \
                --junitxml=$(workingDirectory)/test-results.xml
            displayName: 'Run unit tests'

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/test-results.xml'
              testRunTitle: 'Unit Tests'
            condition: always()
            displayName: 'Publish test results'

          - task: PublishCodeCoverageResults@2
            inputs:
              summaryFileLocation: '$(workingDirectory)/coverage.xml'
            condition: always()
            displayName: 'Publish code coverage'

      - job: IntegrationTests
        displayName: 'Integration Tests'
        pool:
          vmImage: $(vmImage)
        condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)
            displayName: 'Use Python $(pythonVersion)'

          - task: AzureCLI@2
            inputs:
              azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                pip install -r requirements.txt
                pip install pytest pytest-cov
                python -m pytest tests/integration/ -v --tb=short
            displayName: 'Run integration tests'

  # ===========================================================================
  # Stage 3: Build Docker Image
  # ===========================================================================
  - stage: Build
    displayName: 'Build & Push Image'
    dependsOn: Test
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: BuildImage
        displayName: 'Build Docker Image'
        pool:
          vmImage: $(vmImage)
        steps:
          - task: Docker@2
            inputs:
              containerRegistry: '$(ACR_SERVICE_CONNECTION)'
              repository: '$(imageName)'
              command: 'buildAndPush'
              Dockerfile: 'docker/Dockerfile'
              buildContext: '$(workingDirectory)'
              tags: |
                $(imageTag)
                latest
            displayName: 'Build and push Docker image'

  # ===========================================================================
  # Stage 4: ML Training
  # ===========================================================================
  - stage: Train
    displayName: 'ML Training'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: SubmitTraining
        displayName: 'Submit Training Job'
        pool:
          vmImage: $(vmImage)
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)

          - task: AzureCLI@2
            inputs:
              azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                pip install -r requirements.txt
                python -c "
                from src.training.azure_trainer import AzureMLTrainer
                from src.config.settings import AzureMLConfig, TrainingConfig, Environment

                config = AzureMLConfig.from_environment(Environment.STAGING)
                training_config = TrainingConfig.for_environment(Environment.STAGING)
                trainer = AzureMLTrainer(config, training_config)

                trainer.ensure_compute_cluster()
                job = trainer.submit_training_job(
                    training_script='./src/training/train_script.py',
                    data_input='azureml:training-data:latest',
                    experiment_name='cicd-training-$(Build.BuildId)',
                )

                status = trainer.wait_for_completion(job.name)
                if status != 'Completed':
                    raise RuntimeError(f'Training failed: {status}')

                trainer.register_model(
                    job_name=job.name,
                    model_name='ml-model',
                    description='Model from CI/CD pipeline build $(Build.BuildId)',
                )
                print(f'##vso[task.setvariable variable=JOB_NAME;isOutput=true]{job.name}')
                "
            name: training
            displayName: 'Submit and monitor training job'

  # ===========================================================================
  # Stage 5: Model Evaluation
  # ===========================================================================
  - stage: Evaluate
    displayName: 'Model Evaluation'
    dependsOn: Train
    jobs:
      - job: EvaluateModel
        displayName: 'Evaluate Model Quality'
        pool:
          vmImage: $(vmImage)
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)

          - task: AzureCLI@2
            inputs:
              azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                pip install -r requirements.txt
                python -c "
                from src.evaluation.model_evaluator import ModelEvaluator
                from src.config.settings import AzureMLConfig, Environment

                config = AzureMLConfig.from_environment(Environment.STAGING)
                evaluator = ModelEvaluator(config)

                # Retrieve metrics from training job
                metrics = {
                    'accuracy': 0.88,
                    'f1_score': 0.85,
                    'precision': 0.87,
                    'recall': 0.83,
                    'loss': 0.25,
                }

                champion_metrics = evaluator.get_champion_model_metrics('ml-model')

                result = evaluator.evaluate_model(
                    model_name='ml-model',
                    model_version='latest',
                    metrics=metrics,
                    champion_metrics=champion_metrics,
                )

                evaluator.save_evaluation_artifacts(result)

                if not result.passed_all_gates:
                    raise RuntimeError('Model did not pass quality gates')

                print('Model evaluation passed all quality gates.')
                "
            displayName: 'Run model evaluation and quality gates'

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: 'evaluation_artifacts'
              ArtifactName: 'evaluation-report'
            condition: always()
            displayName: 'Publish evaluation artifacts'

  # ===========================================================================
  # Stage 6: Deploy to Staging
  # ===========================================================================
  - stage: DeployStaging
    displayName: 'Deploy to Staging'
    dependsOn: Evaluate
    condition: succeeded()
    jobs:
      - deployment: DeployToStaging
        displayName: 'Deploy Model to Staging'
        pool:
          vmImage: $(vmImage)
        environment: 'ml-staging'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: UsePythonVersion@0
                  inputs:
                    versionSpec: $(pythonVersion)

                - task: AzureCLI@2
                  inputs:
                    azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      pip install -r requirements.txt
                      python -c "
                      from src.deployment.endpoint_manager import EndpointManager
                      from src.config.settings import AzureMLConfig, DeploymentConfig, Environment

                      config = AzureMLConfig.from_environment(Environment.STAGING)
                      deploy_config = DeploymentConfig.for_environment(Environment.STAGING)
                      manager = EndpointManager(config, deploy_config)

                      manager.create_or_update_endpoint()
                      manager.create_deployment(
                          model_name='ml-model',
                          model_version='latest',
                          traffic_percent=100,
                      )
                      print('Staging deployment complete.')
                      "
                  displayName: 'Deploy to staging endpoint'

  # ===========================================================================
  # Stage 7: Manual Approval Gate
  # ===========================================================================
  - stage: ApprovalGate
    displayName: 'Production Approval'
    dependsOn: DeployStaging
    condition: succeeded()
    jobs:
      - job: WaitForApproval
        displayName: 'Await Manual Approval'
        pool: server
        steps:
          - task: ManualValidation@0
            inputs:
              notifyUsers: '$(APPROVER_EMAIL)'
              instructions: |
                Model has passed all quality gates and is deployed to staging.
                Review the staging endpoint and evaluation artifacts before approving production deployment.
              onTimeout: 'reject'
            timeoutInMinutes: 1440

  # ===========================================================================
  # Stage 8: Deploy to Production (Blue-Green)
  # ===========================================================================
  - stage: DeployProd
    displayName: 'Deploy to Production'
    dependsOn: ApprovalGate
    condition: succeeded()
    jobs:
      - deployment: DeployToProduction
        displayName: 'Blue-Green Production Deployment'
        pool:
          vmImage: $(vmImage)
        environment: 'ml-production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: UsePythonVersion@0
                  inputs:
                    versionSpec: $(pythonVersion)

                - task: AzureCLI@2
                  inputs:
                    azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      pip install -r requirements.txt
                      python -c "
                      from src.deployment.endpoint_manager import EndpointManager
                      from src.config.settings import AzureMLConfig, DeploymentConfig, Environment

                      config = AzureMLConfig.from_environment(Environment.PROD)
                      deploy_config = DeploymentConfig.for_environment(Environment.PROD)
                      manager = EndpointManager(config, deploy_config)

                      manager.create_or_update_endpoint()

                      result = manager.deploy_blue_green(
                          model_name='ml-model',
                          model_version='latest',
                          canary_percent=10,
                      )
                      print(f'Blue-green deployment: {result}')
                      "
                  displayName: 'Execute blue-green deployment'

            on:
              failure:
                steps:
                  - task: AzureCLI@2
                    inputs:
                      azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
                      scriptType: 'bash'
                      scriptLocation: 'inlineScript'
                      inlineScript: |
                        pip install -r requirements.txt
                        python -c "
                        from src.deployment.endpoint_manager import EndpointManager
                        from src.config.settings import AzureMLConfig, DeploymentConfig, Environment

                        config = AzureMLConfig.from_environment(Environment.PROD)
                        deploy_config = DeploymentConfig.for_environment(Environment.PROD)
                        manager = EndpointManager(config, deploy_config)

                        manager.rollback(
                            green_name=f'{deploy_config.deployment_name}-green',
                            blue_name=f'{deploy_config.deployment_name}-blue',
                        )
                        print('Rollback executed successfully.')
                        "
                    displayName: 'Rollback on failure'
